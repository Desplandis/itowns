<html>
    <head>
        <title>Itowns - Point cloud loader (Globe)</title>

        <script type="importmap">
        {
            "imports": {
                "itowns": "../dist/itowns.js",
                "debug": "../dist/debug.js",
                "LoadingScreen": "./jsm/GUI/LoadingScreen.js",
                "itowns_widgets": "../dist/itowns_widgets.js",
                "three": "https://unpkg.com/three@0.182.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
            }
        }
        </script>
        <meta charset="UTF-8">
        <link rel="stylesheet" type="text/css" href="css/example.css">
        <link rel="stylesheet" type="text/css" href="css/LoadingScreen.css">

        <style type="text/css">
            #description {
                z-index: 2;
                left: 10px;
            }

            #viewerDiv {
                position: absolute;
                inset: 0;
            }

            #description.error {
                border: 1px solid #cc3311;
            }

            #description .error-message {
                display: none;
                margin-top: 8px;
                color: #cc3311;
                font-size: 12px;
            }

            #description.error .error-message {
                display: block;
            }
        </style>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <form id="description" method="GET">
            <label for="url">
                Specify the URL of a point cloud to load:
            </label>

            <input type="text" id="url" name="url" required placeholder="Point cloud URL" />

            <select id="format" name="format">
                <option value="auto" selected>Auto-detect</option>
                <option value="ept">Entwine (EPT)</option>
                <option value="copc">COPC (.copc.laz)</option>
                <option value="vpc">VPC (.vpc)</option>
                <option value="potree">Potree 1.x</option>
                <option value="potree2">Potree 2.x</option>
            </select>

            <button type="submit">Load</button>

            <div class="error-message" id="errorMessage" role="alert"></div>
        </form>

        <div id="viewerDiv"></div>

        <script type="module">

            import { Vector3 } from 'three';
            import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
            import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
            import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
            import { EDLPass } from './jsm/postprocessing/EDLPass.js';
            import { SceneRenderPass } from './jsm/postprocessing/SceneRenderPass.js';
            import { DepthCompositeShader } from './jsm/postprocessing/DepthCompositeShader.js';
            import setupLoadingScreen from 'LoadingScreen';

            import {
                CopcSource, CopcLayer,
                EntwinePointTileSource, EntwinePointTileLayer,
                GlobeView,
                Coordinates,
                WMTSSource,
                TMSSource,
                ColorLayer,
                ElevationLayer,
                Fetcher,
                View,
            } from 'itowns';
            import * as debug from 'debug';

            const viewerDiv = document.getElementById('viewerDiv');
            const form = document.getElementById('description');
            const urlInput = document.getElementById('url');
            const formatSelect = document.getElementById('format');
            const errorMessage = document.getElementById('errorMessage');

            function getFormat(url, format) {
                if (url.includes('.copc.laz')) { return 'copc'; }
                if (url.includes('ept.json')) { return 'ept'; }
                return format;
            }

            function getPointCloudClass(url, format) {
                if (format === 'copc') {
                    return { Source: CopcSource, Layer: CopcLayer };
                }
                if (format === 'ept') {
                    return { Source: EntwinePointTileSource, Layer: EntwinePointTileLayer };
                }

                throw new Error(`Cannot infer format from URL ${url} and format ${format}`);
            }

            function zoomToLayer(view, layer) {
                const lookAt = layer.root.clampOBB.position;
                const coordLookAt = new Coordinates(view.referenceCrs).setFromVector3(lookAt);

                const size = new Vector3();
                layer.root.voxelOBB.box3D.getSize(size);

                view.controls.lookAtCoordinate({
                    coord: coordLookAt,
                    range: 2 * size.length(),
                }, false);
            }

            async function load(url, format = 'auto') {
                const { Source, Layer } = getPointCloudClass(url, format);

                const source = new Source({ url });
                await source.whenReady;

                // Create GlobeView - near/far are calculated dynamically
                const view = new GlobeView(viewerDiv);
                setupLoadingScreen(viewerDiv, view);
                view.controls.minDistance = 5;

                // Add OSM base imagery layer
                Fetcher.json('./layers/JSONLayers/OPENSM.json').then(function(config) {
                    config.source = new TMSSource(config.source);
                    view.addLayer(new ColorLayer(config.id, config));
                });

                // Add worldwide elevation layer (IGN SRTM3 - float32 BIL format)
                Fetcher.json('./layers/JSONLayers/WORLD_DTM.json').then(function(config) {
                    config.source = new WMTSSource(config.source);
                    view.addLayer(new ElevationLayer(config.id, config));
                });

                // Create and add point cloud layer
                const layer = new Layer('pointcloud', {
                    source,
                    crs: view.referenceCrs,
                    sseThreshold: 2,
                    pointBudget: 3000000,
                });

                // Use View.prototype.addLayer for point cloud on globe
                View.prototype.addLayer.call(view, layer);

                await layer.whenReady;
                zoomToLayer(view, layer);

                // Setup post-processing with EffectComposer
                const gfxEngine = view.mainLoop.gfxEngine;
                const renderer = gfxEngine.renderer;
                const size = gfxEngine.getWindowSize();

                // Create EffectComposer
                const composer = new EffectComposer(renderer);
                composer.setSize(size.x, size.y);

                // Get objects for visibility toggling
                const pointCloudRoot = layer.object3d;
                const globeRoot = view.tileLayer.object3d;

                // Pass 1: Render background (globe without points)
                const backgroundPass = new SceneRenderPass(view.scene, view.camera3D, {
                    exclude: [pointCloudRoot],
                });
                backgroundPass.setSize(size.x, size.y);
                composer.addPass(backgroundPass);

                // Pass 2: Render points only
                const pointsPass = new SceneRenderPass(view.scene, view.camera3D, {
                    include: [pointCloudRoot],
                });
                pointsPass.setSize(size.x, size.y);
                composer.addPass(pointsPass);

                // Pass 3: Apply EDL to points
                const edlPass = new EDLPass(view.camera3D, size.x, size.y);
                edlPass.inputColorTexture = pointsPass.colorTexture;
                edlPass.inputDepthTexture = pointsPass.depthTexture;
                composer.addPass(edlPass);

                // Pass 4: Composite EDL points over background based on depth
                const compositePass = new ShaderPass(DepthCompositeShader);
                compositePass.renderToScreen = true;
                composer.addPass(compositePass);

                // Custom render function
                view.render = function render() {
                    if (!edlPass.enabled) {
                        gfxEngine.renderView(view);
                        return;
                    }

                    // Update EDL input textures (in case passes were resized)
                    edlPass.inputColorTexture = pointsPass.colorTexture;
                    edlPass.inputDepthTexture = pointsPass.depthTexture;

                    // Update composite pass uniforms
                    const uniforms = compositePass.uniforms;
                    uniforms.tBackground.value = backgroundPass.colorTexture;
                    uniforms.tBackgroundDepth.value = backgroundPass.depthTexture;
                    uniforms.tForeground.value = edlPass.outputColorTexture;
                    uniforms.tForegroundDepth.value = pointsPass.depthTexture;

                    // Render the composer
                    composer.render();
                };

                window.addEventListener('resize', () => {
                    const newSize = gfxEngine.getWindowSize();
                    composer.setSize(newSize.x, newSize.y);
                    backgroundPass.setSize(newSize.x, newSize.y);
                    pointsPass.setSize(newSize.x, newSize.y);
                    edlPass.setSize(newSize.x, newSize.y);
                });

                const gui = new GUI();
                debug.PointCloudDebug.initTools(view, layer, gui);

                // EDL controls
                const edlGui = gui.addFolder('Eye Dome Lighting');
                edlGui.add(edlPass, 'enabled').name('Enabled').onChange(() => view.notifyChange());
                edlGui.open();

                // Export to window for debugging
                window.view = view;
                window.layer = layer;
            }

            const params = new URLSearchParams(window.location.search);
            if (params.has('url')) {
                const url = params.get('url');
                const format = getFormat(url, params.get('format'));
                urlInput.value = url;
                formatSelect.value = format;
                try {
                    await load(url, format);
                } catch (error) {
                    console.error(error);
                    const message = error?.message ?? 'Failed to load the point cloud.';
                    form.classList.toggle('error', true);
                    errorMessage.textContent = message;
                }
            }
        </script>
    </body>
</html>
