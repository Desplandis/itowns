<!DOCTYPE html>
<html>

<head>
    <title>Demo PlanarView</title>

    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="css/example.css">
    <link rel="stylesheet" type="text/css" href="css/LoadingScreen.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div id="description">
        <p><b>Point Cloud information</b></p>
        <ul id="info"></ul>
        <p><b>WFS information</b></p>
        <ul id="infoBuilding"></ul>
        <p><b>URBS information</b></p>
        <ul id="urbsInfo"></ul>
    </div>
    <div id="viewerDiv"></div>

    <script type="importmap">
    {
        "imports": {
            "itowns": "../dist/itowns.js",
            "debug": "../dist/debug.js",
            "three": "https://esm.sh/three@0.174.0",
            "three/addons/": "https://esm.sh/three@0.174.0/examples/jsm/",
            "camera-controls": "https://esm.sh/camera-controls@2.7.2",
            "dat": "https://esm.sh/dat.gui@0.7.9",
            "lil": "https://esm.sh/lil-gui@0.19.2"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import * as itowns from 'itowns';
        import CameraControls from 'camera-controls';
        import GuiTools from "./jsm/GUI/GuiTools.js";
        import * as debug from 'debug';
        import lil from 'lil';

        var potreeLayer;
        var viewerDiv;
        var debugGui;
        var view;
        var controls;
        var clock = new THREE.Clock();
        var scene = new THREE.Scene();
        var color = new THREE.Color();
        var debugMenu;
        var viewExtent;
        var pivot;
        var raycaster = new THREE.Raycaster();
        let layerOrtho;
        let layerElevation;

        CameraControls.install({ THREE: THREE });

        viewerDiv = document.getElementById('viewerDiv');
        viewerDiv.style.display = 'block';

        debugGui = new lil();

        // Define crs projection that we will use (taken from https://epsg.io/3946, Proj4js section)
        itowns.CRS.defs('EPSG:2154', '+proj=lcc +lat_1=49 +lat_2=44 +lat_0=46.5 +lon_0=3 +x_0=700000 +y_0=6600000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');
        itowns.CRS.defs('EPSG:3947', '+proj=lcc +lat_0=47 +lon_0=3 +lat_1=46.25 +lat_2=47.75 +x_0=1700000 +y_0=6200000 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs +type=crs');

        let extentSize = 200;
        const viewEPSG = "EPSG:3947";
        const centerCoord = new itowns.Coordinates(viewEPSG, 1351152.118201931, 6240395.0059363097, 61.329999999999998);

        var customCamera = new THREE.PerspectiveCamera(60, 1920 / 693, 0.1, 2000);
        customCamera.up.set(0, 1, 0);
        scene.add(customCamera);

        createLights();
        loadView();

        controls = new CameraControls(customCamera, viewerDiv);

        function animate() {
            const delta = clock.getDelta();
            const updated = controls.update(delta);
            if (updated) {
                view.notifyChange(customCamera);
            }
            requestAnimationFrame(animate);
        }

        function createLights() {
            const directionalLight1 = new THREE.DirectionalLight(0xffeeff, 0.8 * Math.PI);
            directionalLight1.position.set(1, 1, 1);
            directionalLight1.layers.enableAll();
            scene.add(directionalLight1);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.8 * Math.PI);
            directionalLight2.position.set(-1, 0.5, -1);
            directionalLight2.layers.enableAll();
            scene.add(directionalLight2);

            const ambientLight = new THREE.AmbientLight(0xffffee, 0.25 * Math.PI);
            ambientLight.layers.enableAll();
            scene.add(ambientLight);
        }

        function createExtent() {
            let extentCoord1 = new itowns.Coordinates(centerCoord.crs, centerCoord.x - extentSize, centerCoord.y - extentSize);
            let extentCoord2 = new itowns.Coordinates(centerCoord.crs, centerCoord.x + extentSize, centerCoord.y + extentSize);

            extentCoord1 = extentCoord1.as(viewEPSG);
            extentCoord2 = extentCoord2.as(viewEPSG);

            viewExtent = new itowns.Extent(
                viewEPSG,
                extentCoord1.x, extentCoord2.x,
                extentCoord1.y, extentCoord2.y
            );
        }

        function loadView() {
            createExtent();

            const rootObj = new THREE.Object3D();
            rootObj.name = "iTownsViewRoot";
            rootObj.rotateX(-90 * THREE.MathUtils.DEG2RAD);

            const objChild = new THREE.Object3D();
            objChild.name = "pivot";
            objChild.position.copy(new THREE.Vector3(-centerCoord.x, -centerCoord.y, -centerCoord.z));
            rootObj.add(objChild);

            scene.add(rootObj);

            view = new itowns.PlanarView(
                viewerDiv,
                viewExtent,
                {
                    camera: { cameraThree: customCamera },
                    scene3D: scene,
                    noControls: true,
                    object3d: objChild,
                    dynamicCameraNearFar: false
                });
            scene.fog = null;

            view.tileLayer.disableSkirt = true;

            window.view = view;
            debugMenu = new GuiTools('menuDiv', view);

            Promise.all([
                loadElevation(),
                loadOrtho(),
                loadPointCloud(),
            ])
                .then(onAllLoaded);
        }

        function loadElevation() {
            // Define the source of the dem data
            const sourceDEM = new itowns.WMSSource({
                url: "https://data.geopf.fr/wms-r/wms?",
                name: "ELEVATION.ELEVATIONGRIDCOVERAGE.HIGHRES",
                format: "image/x-bil;bits=32",
                crs: 'EPSG:2154',
                extent: viewExtent,
            });
            // Create the dem ElevationLayer and add it to the view
            layerElevation = new itowns.ElevationLayer('Elevation', { source: sourceDEM });
            return view.addLayer(layerElevation);
        }

        function loadOrtho() {
            let sourceMap = new itowns.WMSSource({
                url: "https://data.geopf.fr/wms-r/wms?",
                name: "HR.ORTHOIMAGERY.ORTHOPHOTOS",
                format: "image/png",
                crs: viewEPSG,
                extent: viewExtent
            });;

            // Create the ortho-images ColorLayer and add it to the view
            layerOrtho = new itowns.ColorLayer('Fond de carte', { source: sourceMap });
            return view.addLayer(layerOrtho);
        }

        async function loadPointCloud() {
            const pointCloudGroup = new THREE.Group();
            pointCloudGroup.name = "PointCloudGroup";

            const potreeSource = new itowns.Potree2Source({
                file: 'metadata.json',
                url: 'https://raw.githubusercontent.com/bloc-in-bloc/sample-datas/main/Orvault-Potree2-brotli-3947',
                crs: 'EPSG:3947',
            });

            // Configure Point Cloud layer
            potreeLayer = new itowns.Potree2Layer('points_cloud', {
                object3d: pointCloudGroup,
                source: potreeSource
            });

            view.tileLayer.object3d.add(pointCloudGroup);
            await itowns.View.prototype.addLayer.call(view, potreeLayer);
            return potreeLayer;
        }

        function onAllLoaded() {
            const boundingSphere = new THREE.Box3().setFromObject(view.tileLayer.object3d).getBoundingSphere(new THREE.Sphere());
            boundingSphere.radius *= 0.5;
            controls.fitToSphere(boundingSphere, false);
            controls.rotate(0, 45 * THREE.MathUtils.DEG2RAD, false);

            if (potreeLayer != null) {
                debug.PointCloudDebug.initTools(view, potreeLayer, debugGui);
            }

            var imageryLayers = [];
            if (layerOrtho !== undefined) {
                imageryLayers.push(layerOrtho);
            }

            debugMenu.addImageryLayersGUI(imageryLayers);
            if (layerElevation !== undefined) {
                debugMenu.addElevationLayerGUI(layerElevation);
            }

            if (potreeLayer != null) {
                // update stats window
                var info = document.getElementById('info');
                view.addFrameRequester(itowns.MAIN_LOOP_EVENTS.AFTER_RENDER, () => {
                    info.textContent = potreeLayer.displayedCount.toLocaleString() + ' points';
                });
            }

            animate();
        }
    </script>
</body>

</html>
